<svg width="1024" height="576" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1024" height="576" fill="url(#bg)"/>
  <rect width="1024" height="576" fill="url(#grid)"/>

  <!-- Pipeline flow: Planner → Router → Retriever → Evaluator → Generator -->
  <!-- Node: Planner -->
  <rect x="100" y="240" width="120" height="48" rx="4" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.8"/>
  <text x="160" y="269" font-family="monospace" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="500">Planner</text>

  <!-- Arrow -->
  <line x1="220" y1="264" x2="270" y2="264" stroke="#333" stroke-width="1"/>
  <polygon points="270,260 280,264 270,268" fill="#333"/>

  <!-- Node: Router -->
  <rect x="280" y="240" width="120" height="48" rx="4" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
  <text x="340" y="269" font-family="monospace" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="500" opacity="0.8">Router</text>

  <!-- Arrow -->
  <line x1="400" y1="264" x2="450" y2="264" stroke="#333" stroke-width="1"/>
  <polygon points="450,260 460,264 450,268" fill="#333"/>

  <!-- Node: Retriever (highlighted) -->
  <rect x="460" y="240" width="120" height="48" rx="4" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="520" y="269" font-family="monospace" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="600">Retriever</text>

  <!-- Arrow -->
  <line x1="580" y1="264" x2="630" y2="264" stroke="#333" stroke-width="1"/>
  <polygon points="630,260 640,264 630,268" fill="#333"/>

  <!-- Node: Evaluator -->
  <rect x="640" y="240" width="120" height="48" rx="4" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.6"/>
  <text x="700" y="269" font-family="monospace" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="500" opacity="0.8">Evaluator</text>

  <!-- Arrow -->
  <line x1="760" y1="264" x2="810" y2="264" stroke="#333" stroke-width="1"/>
  <polygon points="810,260 820,264 810,268" fill="#333"/>

  <!-- Node: Generator -->
  <rect x="820" y="240" width="120" height="48" rx="4" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.8"/>
  <text x="880" y="269" font-family="monospace" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="500">Generator</text>

  <!-- Hybrid Search detail below Retriever -->
  <line x1="520" y1="288" x2="520" y2="330" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Dense -->
  <rect x="370" y="340" width="90" height="32" rx="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <text x="415" y="361" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">Dense</text>

  <!-- BM25 -->
  <rect x="475" y="340" width="90" height="32" rx="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <text x="520" y="361" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">BM25</text>

  <!-- RRF -->
  <rect x="580" y="340" width="90" height="32" rx="3" fill="none" stroke="#333" stroke-width="0.8"/>
  <text x="625" y="361" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">RRF</text>

  <!-- Connecting lines to hybrid search components -->
  <line x1="415" y1="340" x2="520" y2="310" stroke="#222" stroke-width="0.6"/>
  <line x1="520" y1="340" x2="520" y2="310" stroke="#222" stroke-width="0.6"/>
  <line x1="625" y1="340" x2="520" y2="310" stroke="#222" stroke-width="0.6"/>

  <!-- Qdrant icon area -->
  <rect x="440" y="400" width="160" height="28" rx="3" fill="none" stroke="#222" stroke-width="0.6"/>
  <text x="520" y="419" font-family="monospace" font-size="9" fill="#444" text-anchor="middle" letter-spacing="2">QDRANT VECTOR DB</text>
  <line x1="520" y1="372" x2="520" y2="400" stroke="#222" stroke-width="0.6" stroke-dasharray="3,3"/>

  <!-- Feedback loop arrow from Evaluator back to Router -->
  <path d="M700,288 L700,310 Q700,320 690,320 L350,320 Q340,320 340,310 L340,288" fill="none" stroke="#333" stroke-width="0.8" stroke-dasharray="4,3"/>
  <polygon points="336,290 340,280 344,290" fill="#333"/>

  <!-- Title area top-left -->
  <text x="100" y="140" font-family="monospace" font-size="11" fill="#444" letter-spacing="2">MULTI-AGENT PIPELINE</text>
  <text x="100" y="175" font-family="sans-serif" font-size="28" fill="#e8e8e8" font-weight="600">Agentic RAG System</text>

  <!-- Tech tags bottom -->
  <text x="100" y="510" font-family="monospace" font-size="10" fill="#333" letter-spacing="1">LangGraph · Qdrant · Hybrid Search · FastAPI · Docker · Langfuse</text>

  <!-- Decorative: subtle accent line -->
  <rect x="100" y="190" width="60" height="1.5" fill="#4ade80" opacity="0.5"/>
</svg>
