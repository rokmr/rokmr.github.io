<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Redirect rokmr.github.io → rohit.vision (fixes Google canonical issue) -->
    <script>
    if (location.hostname === 'rokmr.github.io') {
        location.replace('https://rohit.vision' + location.pathname + location.search + location.hash);
    }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Rohit Kumar</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="/assets/images/profile.webp">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e8e8e8;
            --text-secondary: #999999;
            --dim: #888888;
            --border: #222222;
            --accent: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-container {
            text-align: center;
            max-width: 480px;
        }

        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .error-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
        }

        .error-message {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .error-terminal {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--dim);
            background: rgba(17, 17, 17, 0.8);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.25rem 1.5rem;
            text-align: left;
            margin-bottom: 2.5rem;
        }

        .error-terminal .prompt { color: var(--accent); }
        .error-terminal .output { color: var(--text-secondary); }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 0.8rem 1.5rem;
            border-radius: 2px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .error-btn-primary {
            background: #fff;
            color: #000;
            border: 1px solid #fff;
        }

        .error-btn-primary:hover {
            background: transparent;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
        }

        .error-btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .error-btn-secondary:hover {
            border-color: #fff;
            transform: translateY(-2px);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        footer a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--dim);
            text-decoration: none;
            letter-spacing: 2px;
        }

        footer a:hover { color: var(--text); }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-label">Page Not Found</div>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved.
            Maybe it got lost in latent space.
        </p>
        <div class="error-terminal">
            <span class="prompt">rohit@vision:~$</span> curl -I /this-page<br>
            <span class="output">HTTP/1.1 404 Not Found</span><br>
            <span class="prompt">rohit@vision:~$</span> cd /<br>
            <span class="output">Redirecting to homepage...</span>
        </div>
        <div class="error-actions">
            <a href="/" class="error-btn error-btn-primary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Home
            </a>
            <a href="/blogs/" class="error-btn error-btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                Blog
            </a>
            <a href="mailto:contact@rohit.vision" class="error-btn error-btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M22 7l-10 6L2 7"/>
                </svg>
                Contact
            </a>
        </div>
    </div>

    <footer>
        <a href="/">ROHIT KUMAR</a>
    </footer>
</body>

</html>
